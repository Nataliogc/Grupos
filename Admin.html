<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Groups - Panel de Gestión Estratégica</title>
  <link rel="icon" type="image/png" href="Nexus Groups/Nexus_Groups_ICO-removebg-preview.png" />
  <!-- Tailwind CSS (CDN necesario para clases dinámicas en JSX) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "ui-sans-serif", "system-ui"],
            outfit: ["Outfit", "sans-serif"],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="style.css" />

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@300;400;600;700&display=swap"
    rel="stylesheet" />

  <!-- Lucide Icons -->
  <script src="https://cdn.jsdelivr.net/npm/lucide/dist/umd/lucide.js"></script>

  <!-- React & ReactDOM (Versión 18) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>


  <!-- Firebase SDK (Compat mode) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

  <!-- Markdown Parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Prop-Types (Required by Recharts UMD) -->
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.js"></script>

  <!-- Recharts -->
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

  <!-- Import Map para SDK Gemini -->
  <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
  <style>
    :root {
      --nexus-bg: #f8fafc;
      --nexus-card: #ffffff;
      --nexus-accent: #10b981;
      --nexus-accent-light: rgba(16, 185, 129, 0.1);
      --nexus-border: #e2e8f0;
      --nexus-text: #1e293b;
      --nexus-text-dim: #64748b;
    }

    body {
      font-family: "Outfit", sans-serif;
      background-color: var(--nexus-bg);
      color: var(--nexus-text);
      margin: 0;
      overflow-x: hidden;
    }

    .premium-card {
      background: var(--nexus-card);
      border: 1px solid var(--nexus-border);
      border-radius: 1.5rem;
      box-shadow:
        0 4px 6px -1px rgba(0, 0, 0, 0.05),
        0 2px 4px -1px rgba(0, 0, 0, 0.03);
      transition:
        transform 0.3s ease,
        box-shadow 0.3s ease;
    }

    .premium-card:hover {
      transform: translateY(-2px);
      box-shadow:
        0 10px 15px -3px rgba(0, 0, 0, 0.08),
        0 4px 6px -2px rgba(0, 0, 0, 0.04);
    }

    .emerald-stat {
      color: var(--nexus-accent);
      font-weight: 900;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* re-charts adjustments */
    .recharts-cartesian-grid-horizontal line,
    .recharts-cartesian-grid-vertical line {
      stroke: #f1f5f9;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* KPI Cards hover lift */
    .kpi-card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .kpi-card:hover {
      transform: translateY(-6px) !important;
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.12) !important;
    }

    /* Table rows */
    tr {
      transition: background-color 0.15s ease;
    }

    tbody tr:hover {
      background: linear-gradient(90deg, rgba(99, 102, 241, 0.03), rgba(59, 130, 246, 0.03)) !important;
    }

    /* Interactions */
    button:active,
    [role="button"]:active {
      transform: scale(0.97);
    }

    :focus-visible {
      outline: 2px solid #6366f1;
      outline-offset: 2px;
      border-radius: 4px;
    }

    .tabular-nums {
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <!-- Configuración Firebase Centralizada -->
  <script src="js/firebase-config.js"></script>
  <!-- Módulos Compartidos -->
  <script src="js/utils.js"></script>
  <script src="js/gemini.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/firebase-init.js"></script>

  <script src="js/Admin.js"></script>
</body>

</html>
