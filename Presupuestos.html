<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Presupuestos - CRM Grupos</title>

  <!-- Tailwind CSS (CDN necesario para clases dinámicas en JSX) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Favicon -->
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2965/2965358.png">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Firebase SDK (Compat mode) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

  <!-- Configuración Centralizada -->
  <script src="js/firebase-config.js"></script>
  <!-- Módulos Compartidos -->
  <script src="js/utils.js"></script>
  <script src="js/gemini.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/firebase-init.js"></script>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>



  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    body {
      font-family: 'Inter', sans-serif;
    }

    /* Smooth transitions on interactive elements */
    button,
    a,
    input,
    select,
    [role="button"] {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Scrollbar */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #cbd5e1, #94a3b8);
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fadeIn 0.35s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .animate-slide-up {
      animation: slideUp 0.4s ease-out;
    }

    /* Card hover lift */
    .card-hover {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.1);
    }

    /* Room cards interactive */
    input[type="number"]:focus {
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    /* Button interactions */
    button:active,
    [role="button"]:active {
      transform: scale(0.97);
    }

    /* Focus visible */
    :focus-visible {
      outline: 2px solid #6366f1;
      outline-offset: 2px;
      border-radius: 4px;
    }

    @media print {
      .no-print {
        display: none !important;
      }

      body {
        background-color: white !important;
      }

      .print-shadow-none {
        box-shadow: none !important;
        border: none !important;
      }

      .print-break-before {
        break-before: page !important;
        display: block !important;
      }

      /* Avoid breaking inside table rows or cards */
      tr, .card, blockquote {
        break-inside: avoid;
      }
    }

    /* Hide number input spin buttons */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type=number] {
      -moz-appearance: textfield;
      appearance: textfield;
    }
  </style>
</head>

<body class="bg-slate-50 min-h-screen">
  <div id="root"></div>

  <script src="js/Presupuestos.js?v=1.0.3"></script>
</body>

</html>
