  <style>

    /* ═══ NEXUS GROUPS — Enhanced Visual System ═══ */



    /* Scrollbar */

    .custom-scrollbar::-webkit-scrollbar {

      width: 6px;

      height: 6px;

    }



    .custom-scrollbar::-webkit-scrollbar-track {

      background: transparent;

    }



    .custom-scrollbar::-webkit-scrollbar-thumb {

      background: linear-gradient(135deg, #cbd5e1, #94a3b8);

      border-radius: 10px;

    }



    .custom-scrollbar::-webkit-scrollbar-thumb:hover {

      background: #64748b;

    }



    /* Global smooth transitions */

    button,

    a,

    input,

    select,

    [role="button"] {

      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);

    }



    /* Animations */

    @keyframes blynk {



      0%,

      100% {

        opacity: 1;

        filter: brightness(1);

      }



      50% {

        opacity: 0.6;

        filter: brightness(1.1);

      }

    }



    .animate-blynk {

      animation: blynk 1.5s ease-in-out infinite;

    }



    @keyframes fadeIn {

      from {

        opacity: 0;

        transform: translateY(10px);

      }



      to {

        opacity: 1;

        transform: translateY(0);

      }

    }



    .animate-fade-in {

      animation: fadeIn 0.35s ease-out forwards;

    }



    @keyframes slideUp {

      from {

        opacity: 0;

        transform: translateY(24px) scale(0.97);

      }



      to {

        opacity: 1;

        transform: translateY(0) scale(1);

      }

    }



    @keyframes shimmer {

      0% {

        background-position: -200% 0;

      }



      100% {

        background-position: 200% 0;

      }

    }



    @keyframes pulse-glow {



      0%,

      100% {

        box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.2);

      }



      50% {

        box-shadow: 0 0 0 8px rgba(16, 185, 129, 0);

      }

    }



    /* KPI Cards — staggered entrance + hover lift */

    .kpi-card {

      opacity: 0;

      animation: slideUp 0.5s ease-out forwards;

      transition: transform 0.3s ease, box-shadow 0.3s ease;

      cursor: default;

    }



    .kpi-card:hover {

      transform: translateY(-6px) !important;

      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.12) !important;

    }



    .kpi-card:nth-child(1) {

      animation-delay: 0.05s;

    }



    .kpi-card:nth-child(2) {

      animation-delay: 0.10s;

    }



    .kpi-card:nth-child(3) {

      animation-delay: 0.15s;

    }



    .kpi-card:nth-child(4) {

      animation-delay: 0.20s;

    }



    /* Table rows — interactive hover */

    tr {

      transition: background-color 0.15s ease, transform 0.15s ease;

    }



    tbody tr:hover {

      background: linear-gradient(90deg, rgba(16, 185, 129, 0.04), rgba(59, 130, 246, 0.04)) !important;

    }



    /* Dot pattern background */

    .bg-dot-pattern {

      background-image: radial-gradient(circle, #e2e8f0 1px, transparent 1px);

      background-size: 24px 24px;

    }



    /* Loading spinner */

    @keyframes nexus-spin {

      to {

        transform: rotate(360deg);

      }

    }



    .nexus-spinner {

      width: 32px;

      height: 32px;

      border: 3px solid #e2e8f0;

      border-top-color: #10b981;

      border-radius: 50%;

      animation: nexus-spin 0.7s linear infinite;

    }



    /* Glass effects */

    .glass-backdrop {

      background: rgba(15, 23, 42, 0.5);

      backdrop-filter: blur(12px);

      -webkit-backdrop-filter: blur(12px);

    }



    .glass-card {

      background: rgba(255, 255, 255, 0.75);

      backdrop-filter: blur(8px);

      border: 1px solid rgba(255, 255, 255, 0.3);

    }



    /* Interactive buttons */

    .btn-glow:hover {

      box-shadow: 0 0 25px rgba(16, 185, 129, 0.35);

      transform: translateY(-1px);

    }



    .btn-glow:active {

      transform: translateY(0) scale(0.97);

    }



    button:active,

    [role="button"]:active {

      transform: scale(0.97);

    }



    .tabular-nums {

      font-variant-numeric: tabular-nums;

    }



    /* Focus visible */

    :focus-visible {

      outline: 2px solid #10b981;

      outline-offset: 2px;

      border-radius: 4px;

    }



    /* Skeleton loading */

    .skeleton {

      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);

      background-size: 200% 100%;

      animation: shimmer 1.5s infinite;

      border-radius: 8px;

    }



    /* Status badge pulse */

    .status-pulse {

      animation: pulse-glow 2s ease-in-out infinite;

    }



    /* Ficha modal — ensure full scrollability */

    .ficha-modal {

      max-height: 90vh;

      overflow-y: auto;

      overflow-x: hidden;

    }



    /* Print */

    @media print {



      header,

      .no-print {

        display: none !important;

      }



      .print-full {

        width: 100% !important;

        max-width: none !important;

      }

    }
