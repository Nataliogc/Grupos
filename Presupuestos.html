<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Presupuestos - CRM Grupos</title>

  <!-- Tailwind CSS (CDN necesario para clases dinámicas en JSX) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Firebase SDK (Compat mode) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

  <!-- Configuración Centralizada -->
  <script src="js/firebase-config.js"></script>
  <!-- Módulos Compartidos -->
  <script src="js/utils.js"></script>
  <script src="js/gemini.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/firebase-init.js"></script>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    body {
      font-family: 'Inter', sans-serif;
    }

    /* Smooth transitions on interactive elements */
    button,
    a,
    input,
    select,
    [role="button"] {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Scrollbar */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #cbd5e1, #94a3b8);
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fadeIn 0.35s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .animate-slide-up {
      animation: slideUp 0.4s ease-out;
    }

    /* Card hover lift */
    .card-hover {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.1);
    }

    /* Room cards interactive */
    input[type="number"]:focus {
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    /* Button interactions */
    button:active,
    [role="button"]:active {
      transform: scale(0.97);
    }

    /* Focus visible */
    :focus-visible {
      outline: 2px solid #6366f1;
      outline-offset: 2px;
      border-radius: 4px;
    }

    @media print {
      .no-print {
        display: none !important;
      }

      body {
        background-color: white !important;
      }

      .print-shadow-none {
        box-shadow: none !important;
        border: none !important;
      }
    }

    /* Hide number input spin buttons */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type=number] {
      -moz-appearance: textfield;
      appearance: textfield;
    }
  </style>
</head>

<body class="bg-slate-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- FIREBASE ---
    const db = window.db;

    // --- CONSTANTES ---
    const ROOM_TYPES = {
      "Sercotel Guadiana": ["DOBLE DE USO INDIVIDUAL", "DOBLE", "DOBLE + SUPLETORIA", "CUÁDRUPLE"],
      "Cumbria Spa & Hotel": ["DOBLE DE USO INDIVIDUAL", "DOBLE", "DOBLE + SUPLETORIA"]
    };

    const BOARD_TYPES = [
      "SA (Solo Alojamiento)",
      "AD (Alojamiento y Desayuno)",
      "MP (Media Pensión)",
      "PC (Pensión Completa)"
    ];

    // Personas por tipo de habitación (auto-cálculo PAX)
    const PAX_PER_ROOM = {
      // Nuevos tipos oficiales
      "DOBLE DE USO INDIVIDUAL": 1,
      "DOBLE": 2,
      "DOBLE + SUPLETORIA": 3,
      "CUÁDRUPLE": 4,
      // Retrocompatibilidad
      "Doble Individual": 1,
      "Doble de Uso Individual": 1,
      "Doble 2 Camas": 2,
      "Doble Matrimonial": 2,
      "Doble": 2,
      "Doble + Supletoria": 3,
      "Triple": 3,
      "Junior Suite": 2,
      "Cuádruple": 4,
    };

    // --- UTILS (cargadas desde js/utils.js) ---
    const generateDates = NexusUtils.generateDates;
    const formatDate = NexusUtils.formatDate;
    const formatNum = NexusUtils.formatNum;
    const getStatusColor = NexusUtils.getStatusColor;

    const DEFAULT_FORM_DATA = {
      Hotel_Asignado: 'Sercotel Guadiana',
      "Nombre del Grupo": '',
      Com_Nombre_Contacto: '',
      Com_Email_Contacto: '',
      Com_Telefono_Contacto: '',
      Entrada: '',
      Salida: '',
      roomCounts: {},
      dailyConfig: {},
      Com_Notas: '',
      Com_Estado_Interno: 'PRESUPUESTO'
    };

    const ROOM_MIGRATION_MAP = {
      "doble individual": "DOBLE DE USO INDIVIDUAL",
      "doble de uso individual": "DOBLE DE USO INDIVIDUAL",
      "doble 2 camas": "DOBLE",
      "doble matrimonial": "DOBLE",
      "doble": "DOBLE",
      "doble + supletoria": "DOBLE + SUPLETORIA",
      "triple": "DOBLE + SUPLETORIA",
      "junior suite": "DOBLE",
      "cuádruple": "CUÁDRUPLE"
    };

    const normalizeGroupData = (groupData) => {
      if (!groupData) return null;
      const newData = { ...groupData };

      const newRoomCounts = {};
      Object.entries(newData.roomCounts || {}).forEach(([oldType, count]) => {
        const normOld = oldType.toLowerCase();
        const newType = ROOM_MIGRATION_MAP[normOld] || oldType.toUpperCase();
        newRoomCounts[newType] = (newRoomCounts[newType] || 0) + Number(count);
      });
      newData.roomCounts = newRoomCounts;

      if (newData.dailyConfig) {
        newData.dailyConfig = { ...newData.dailyConfig };
        Object.entries(newData.dailyConfig).forEach(([date, dayConf]) => {
          const newDayConf = { ...dayConf };

          if (newDayConf.prices) {
            const newPrices = {};
            Object.entries(newDayConf.prices).forEach(([oldType, price]) => {
              const normOld = oldType.toLowerCase();
              const newType = ROOM_MIGRATION_MAP[normOld] || oldType.toUpperCase();
              newPrices[newType] = price;
            });
            newDayConf.prices = newPrices;
          }
          // The other legacy configuration mode
          Object.keys(newDayConf).forEach(oldType => {
            if (oldType !== 'board' && oldType !== 'prices') {
              const normOld = oldType.toLowerCase();
              if (ROOM_MIGRATION_MAP[normOld] || ['doble', 'triple'].some(x => normOld.includes(x))) {
                const newType = ROOM_MIGRATION_MAP[normOld] || oldType.toUpperCase();
                if (oldType !== newType) {
                  newDayConf[newType] = newDayConf[oldType];
                  delete newDayConf[oldType];
                }
              }
            }
          });
          newData.dailyConfig[date] = newDayConf;
        });
      }
      return newData;
    };

    function App() {
      const [groups, setGroups] = useState([]);
      const [loading, setLoading] = useState(true);
      const [currentView, setCurrentView] = useState('dashboard');
      const [selectedGroup, setSelectedGroup] = useState(null);
      const [newNote, setNewNote] = useState('');
      const [globalConfig, setGlobalConfig] = useState(null);
      const [filterStatus, setFilterStatus] = useState('ACTIVOS');

      useEffect(() => {
        db.collection("settings").doc("main").get().then(doc => {
          if (doc.exists) {
            setGlobalConfig(doc.data());
          }
        });
      }, []);

      const [formData, setFormData] = useState(DEFAULT_FORM_DATA);

      // Cargar datos y manejar parámetros de URL
      useEffect(() => {
        const unsubscribe = db.collection("groups")
          .onSnapshot((snapshot) => {
            const docs = snapshot.docs.map(doc => ({
              uid: doc.id,
              ...doc.data()
            })).filter(g => {
              const est = (g.Estado || "").toUpperCase();
              const intEst = (g.Com_Estado_Interno || "").toUpperCase();

              const isBudget =
                String(g.Reserva || "").startsWith("PRES-") ||
                est.includes("PRESUPUESTO") ||
                intEst.includes("PRESUPUESTO") ||
                intEst.includes("ENVIADO") ||
                intEst.includes("SEGUIMIENTO") ||
                intEst.includes("PENDIENTE");

              if (!isBudget) return false;

              // En el cargador general de Presupuestos, permitimos todos los estados
              // (la lógica de visualización se encarga de filtrar por la pestaña seleccionada)
              return true;
            });
            setGroups(docs);
            setLoading(false);

            // Lógica de Deep-link (?id=XXXX)
            const urlParams = new URLSearchParams(window.location.search);
            const budgetId = urlParams.get('id');
            const shouldEdit = urlParams.get('edit') === '1';

            if (budgetId && docs.length > 0) {
              const matched = docs.find(g => String(g.Reserva) === String(budgetId) || String(g.uid) === String(budgetId));
              if (matched) {
                const normMatched = normalizeGroupData(matched);
                if (shouldEdit) {
                  setFormData(normMatched);
                  setCurrentView('create');
                } else {
                  setSelectedGroup(normMatched);
                  setCurrentView('detail');
                }
                window.history.replaceState({}, document.title, window.location.pathname);
              }
            }
          });
        return () => unsubscribe();
      }, []);

      const processedGroups = useMemo(() => {
        if (filterStatus === 'all') return groups;
        const todayStr = new Date().toISOString().split('T')[0];

        return groups.filter(g => {
          const intEst = (g.Com_Estado_Interno || "").toUpperCase();
          const extEst = (g.Estado || "").toUpperCase();
          const isCancelled = ["CANCEL", "ANUL", "GASTOS", "DESESTIMADO", "BAJA"].some(status => intEst.includes(status) || extEst.includes(status));
          const isConfirmed = intEst.includes("CONFIRM") || extEst.includes("CONFIRM");
          
          const departureStr = g.Salida || g.Entrada || "";
          const isPast = departureStr && departureStr < todayStr;

          if (isConfirmed) {
            return false;
          }

          if (filterStatus === 'ACTIVOS') {
            return !isCancelled && !isPast;
          }
          if (filterStatus === 'DESESTIMADOS') {
            return isCancelled;
          }
          if (filterStatus === 'PASADOS') {
            return isPast && !isCancelled;
          }

          return true;
        });
      }, [groups, filterStatus]);

      const calculateTotal = (rawGroupData) => {
        const groupData = normalizeGroupData(rawGroupData);
        if (!groupData) return 0;

        const dates = generateDates(groupData.Entrada, groupData.Salida);
        let total = 0;
        dates.forEach(date => {
          const config = groupData.dailyConfig?.[date] || {};
          Object.entries(groupData.roomCounts || {}).forEach(([type, globalCount]) => {
            let count = globalCount;
            if (config.counts) {
              const countKey = Object.keys(config.counts).find(k => k.toLowerCase() === type.toLowerCase());
              if (countKey && config.counts[countKey] !== '' && config.counts[countKey] !== undefined) {
                count = Number(config.counts[countKey]);
              }
            }
            if (count > 0) {
              let lineSubtotal = 0;
              if (config.prices) {
                const priceKey = Object.keys(config.prices).find(k => k.toLowerCase() === type.toLowerCase());
                const p = priceKey ? parseFloat(config.prices[priceKey] || 0) : 0;
                lineSubtotal = p * count;
              } else {
                const typeKey = Object.keys(config).find(k => k.toLowerCase() === type.toLowerCase());
                if (typeKey && config[typeKey]) {
                  const price = parseFloat(config[typeKey].price) || 0;
                  const discount = parseFloat(config[typeKey].discount) || 0;
                  const gratuities = parseInt(config[typeKey].gratuities) || 0;
                  const billableCount = Math.max(0, count - gratuities);
                  lineSubtotal = billableCount * price * (1 - discount / 100);
                }
              }
              total += lineSubtotal;
            }
          });
        });
        // Suplementos y Descuentos Globales
        const suplementos = parseFloat(groupData.Suplementos) || 0;
        const descuentos = parseFloat(groupData.Descuentos) || 0;
        total = total + suplementos - descuentos;

        // Si no hay configuración diaria pero hay un importe fijado (desde IA)
        if (total === 0 && groupData["Importe(*)"]) {
          const imp = parseFloat(String(groupData["Importe(*)"]).replace(',', '.'));
          return isNaN(imp) ? 0 : imp;
        }
        return total > 0 ? total : 0;
      };

      const handleHotelChange = (e) => {
        setFormData({
          ...formData,
          Hotel_Asignado: e.target.value,
          roomCounts: {},
          dailyConfig: {}
        });
      };

      const handleRoomCountChange = (type, value) => {
        const newRoomCounts = { ...(formData.roomCounts || {}), [type]: Number(value) };
        // Auto-calcular PAX total
        const totalPax = Object.entries(newRoomCounts).reduce((sum, [roomType, count]) => {
          return sum + (count || 0) * (PAX_PER_ROOM[roomType] || 2);
        }, 0);
        setFormData({
          ...formData,
          roomCounts: newRoomCounts,
          "Pax.": totalPax
        });
      };

      const handleDailyConfigChange = (date, field, value, roomType = null) => {
        setFormData(prev => {
          const newDailyConfig = { ...(prev.dailyConfig || {}) };
          if (!newDailyConfig[date]) {
            newDailyConfig[date] = { board: 'AD (Alojamiento y Desayuno)', prices: {}, counts: {} };
          }
          if (roomType) {
            newDailyConfig[date][field] = { ...(newDailyConfig[date][field] || {}), [roomType]: value === '' ? '' : Number(value) };
          } else {
            newDailyConfig[date][field] = value;
          }
          return { ...prev, dailyConfig: newDailyConfig };
        });
      };

      const handleSave = async (e) => {
        e.preventDefault();
        const now = new Date();
        const formattedDate = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

        const reservaId = formData.Reserva || `PRES-${Math.floor(100000 + Math.random() * 900000)}`;
        const isNew = !formData.uid;

        const groupData = {
          ...formData,
          Reserva: reservaId,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          tracking: formData.tracking || [{ id: Date.now(), date: formattedDate, text: "Presupuesto registrado." }],
          "Importe(*)": formatNum(calculateTotal(formData))
        };

        try {
          if (isNew) {
            groupData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            groupData.Estado = "Presupuesto";
            await db.collection("groups").doc(reservaId).set(groupData);
          } else {
            const uidToUpdate = groupData.uid;
            delete groupData.uid; // evitar guardarlo duplicado en document fields

            const validUpdateData = {};
            const fallbackData = {};

            // Firebase update() no soporta ciertos caracteres en las keys.
            // Extraemos esos campos para guardarlos con set({merge: true})
            Object.keys(groupData).forEach(key => {
              if (/[~*/\[\].]/.test(key)) {
                fallbackData[key] = groupData[key];
              } else {
                validUpdateData[key] = groupData[key];
              }
            });

            // Usar update en lugar de set({merge: true}) para que mapas
            // enteros (roomCounts, dailyConfig) se REEMPLACEN, no se deep-mergen.
            if (Object.keys(validUpdateData).length > 0) {
              await db.collection("groups").doc(uidToUpdate).update(validUpdateData);
            }
            if (Object.keys(fallbackData).length > 0) {
              await db.collection("groups").doc(uidToUpdate).set(fallbackData, { merge: true });
            }
          }
          setCurrentView('dashboard');
        } catch (error) {
          console.error("Error saving budget:", error);
          alert("Error al guardar.");
        }
      };

      const handleDelete = async (uid) => {
        if (!confirm("¿Eliminar este presupuesto?")) return;
        try {
          await db.collection("groups").doc(uid).delete();
        } catch (error) { console.error(error); }
      };

      const updateStatus = async (uid, newStatus) => {
        try {
          const now = new Date();
          const formattedDate = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
          const budget = groups.find(g => g.uid === uid);
          const newTracking = [{ id: Date.now(), date: formattedDate, text: `Estado -> ${newStatus}` }, ...(budget.tracking || [])];
          await db.collection("groups").doc(uid).update({ Com_Estado_Interno: newStatus, tracking: newTracking });
        } catch (error) { console.error(error); }
      };

      const addTrackingNote = async (e) => {
        e.preventDefault();
        if (!newNote.trim() || !selectedGroup) return;
        try {
          const now = new Date();
          const formattedDate = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
          const newTracking = [{ id: Date.now(), date: formattedDate, text: newNote }, ...(selectedGroup.tracking || [])];
          await db.collection("groups").doc(selectedGroup.uid).update({ tracking: newTracking });
          setNewNote('');
        } catch (error) { console.error(error); }
      };

      // --- VISTAS ---
      const renderDashboard = () => (
        <div className="space-y-6">
          <div className="grid grid-cols-1 md:grid-cols-4 gap-4 hidden">
          </div>

          <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div className="p-6 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center bg-slate-50/50 gap-4">
              <h2 className="text-xl font-black text-slate-800">Seguimiento de Cotizaciones</h2>
              <div className="flex flex-col sm:flex-row gap-3 w-full sm:w-auto items-center">
                <div className="relative w-full sm:w-48">
                  <select
                    value={filterStatus}
                    onChange={(e) => setFilterStatus(e.target.value)}
                    className="w-full bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-bold text-slate-600 outline-none focus:border-indigo-500 appearance-none shadow-sm cursor-pointer"
                  >
                    <option value="ACTIVOS">ACTIVOS</option>
                    <option value="DESESTIMADOS">DESESTIMADOS</option>
                    <option value="PASADOS">PASADOS</option>
                  </select>
                  <i className="fas fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-[10px]"></i>
                </div>
                <div className="flex gap-2 w-full sm:w-auto">
                  <button onClick={() => { setFormData(DEFAULT_FORM_DATA); setCurrentView('create'); }}
                    className="flex-1 sm:flex-none px-5 py-2.5 bg-white border border-slate-200 rounded-xl text-slate-600 font-bold text-sm hover:bg-slate-50 transition-all flex items-center justify-center gap-2">
                    <i className="fas fa-pencil-alt"></i> Crear Manual
                  </button>
                  <button onClick={() => window.location.href = 'AltaEmail.html'}
                    className="flex-1 sm:flex-none bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl transition-all text-sm font-bold shadow-lg shadow-indigo-200 flex items-center justify-center gap-2">
                    <i className="fas fa-sparkles"></i> Alta con IA
                  </button>
                </div>
              </div>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              {processedGroups.map(rawG => {
                const g = normalizeGroupData(rawG);
                const totalAmount = calculateTotal(g);
                const hotelName = g.Hotel_Asignado || g.Hotel || "N/A";
                const normalizedRooms = {};
                Object.entries(g.roomCounts || {}).forEach(([t, c]) => {
                  if (c > 0) {
                    const lower = t.toLowerCase();
                    if (normalizedRooms[lower]) {
                      normalizedRooms[lower].count += Number(c);
                    } else {
                      normalizedRooms[lower] = { type: t, count: Number(c) };
                    }
                  }
                });
                const activeRooms = Object.values(normalizedRooms).map(v => [v.type, v.count]);
                const totalRoomsNumeric = activeRooms.reduce((a, [_, b]) => a + Number(b), 0);
                const roomsCountText = totalRoomsNumeric > 0 ? totalRoomsNumeric : (g["Cant. Habitaciones"] || g["Habitaciones"] || g["Cant."] || 0);
                const paxCount = g["Pax."] || 0;
                const statusColor = getStatusColor(g.Com_Estado_Interno || g.Estado);

                return (
                  <div key={g.uid}
                    className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 hover:border-indigo-200 transition-all group relative overflow-hidden flex flex-col h-full">

                    {/* Badge de Estado */}
                    <div className={`absolute top-0 right-0 px-3 py-1 rounded-bl-xl text-[8px] font-black uppercase tracking-widest ${statusColor}`}>
                      {g.Com_Estado_Interno || g.Estado}
                    </div>

                    {/* Header: Logo & Títulos */}
                    <div className="flex items-start gap-4 mb-4">
                      <div className="w-12 h-12 rounded-2xl flex items-center justify-center shrink-0 bg-white border border-slate-100 overflow-hidden p-1.5 shadow-sm group-hover:scale-110 transition-transform">
                        <img
                          src={hotelName.toLowerCase().includes('cumbria') ? "Logos/Cumbria Spa&Hotel.jpg" : "Logos/Sercotel Guadiana.jpg"}
                          className="w-full h-full object-contain"
                          alt="Hotel"
                        />
                      </div>
                      <div className="flex-1 min-w-0">
                        <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-0.5 opacity-60">
                          {hotelName} • ID: {g.Reserva}
                        </span>
                        <h4 className="text-sm font-black text-slate-800 uppercase leading-tight line-clamp-2 group-hover:text-indigo-600 transition-colors">
                          {g["Nombre del Grupo"]}
                        </h4>
                      </div>
                    </div>

                    {/* Ficha: Datos principales */}
                    <div className="grid grid-cols-2 gap-3 mb-6">
                      <div
                        onClick={() => window.location.href = `Gestión de Grupos.html?reserva=${g.Reserva}`}
                        className="bg-slate-50/50 p-2.5 rounded-2xl border border-slate-50 hover:border-indigo-200 hover:bg-indigo-50/30 cursor-pointer transition-all group/date"
                      >
                        <p className="text-[8px] font-bold text-slate-400 uppercase tracking-widest mb-1 flex items-center justify-between">
                          Entrada

                <button onClick={() => setCurrentView('dashboard')} className="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-xl text-slate-400 hover:text-slate-800 transition-all border border-slate-100 flex-shrink-0">
                  <i className="fas fa-arrow-left"></i>
                </button>
                <div>
                  <label className="text-[10px] font-black text-indigo-600 uppercase tracking-widest block mb-1">
                    {hotelName} {g.Reserva ? `• ${g.Reserva}` : ''}
                  </label>
                  <h2 className="text-2xl font-black text-slate-800 tracking-tight leading-none">{g["Nombre del Grupo"]}</h2>
                  <p className="text-xs text-slate-400 mt-2 flex items-center gap-3">
                    <span className="flex items-center gap-1.5"><i className="far fa-calendar text-slate-300"></i> {formatDate(g.Entrada)} a {formatDate(g.Salida)}</span>
                    <span className="text-slate-200">|</span>
                    <span className="flex items-center gap-1.5"><i className="fas fa-users text-slate-300"></i> {totalPax} pax</span>
                    <span className="text-slate-200">|</span>
                    <span className="text-indigo-600 font-bold">{formatNum(calculatedTotal)} €</span>
                  </p>
                </div>
              </div>
              <div className="flex items-center gap-3 w-full md:w-auto mt-4 md:mt-0 pt-4 md:pt-0 border-t md:border-t-0 border-slate-100">
                <div className="flex-1 md:flex-none relative">
                  <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[9px] font-black text-slate-400 uppercase tracking-widest hidden md:block">Estado:</span>
                  <select
                    value={g.Com_Estado_Interno || g.Estado}
                    onChange={(e) => updateStatus(g.uid, e.target.value)}
                    className="w-full md:w-48 pl-3 md:pl-16 pr-8 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-black text-indigo-600 outline-none appearance-none cursor-pointer hover:bg-white transition-all"
                  >
                    <option value="PRESUPUESTO">PENDIENTE</option>
                    <option value="ENVIADO">PPT ENVIADO</option>
                    <option value="SEGUIMIENTO">EN SEGUIMIENTO</option>
                    <option value="CONFIRMADO">CONFIRMADO</option>
                    <option value="DESESTIMADO">DESESTIMADO</option>
                  </select>
                  <i className="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-indigo-400 text-[10px] pointer-events-none"></i>
                </div>
                <div className="flex gap-2 w-full md:w-auto mt-3 md:mt-0">
                  <button onClick={() => { setFormData(normalizeGroupData(g)); setCurrentView('create'); }}
                    className="flex-1 md:flex-none px-4 py-2.5 bg-slate-50 border border-slate-200 text-slate-600 rounded-xl font-bold text-xs hover:bg-slate-100 transition-all flex items-center justify-center gap-2">
                    <i className="fas fa-edit"></i> Editar Presupuesto
                  </button>
                  <button onClick={() => {
                    const quoteElement = document.getElementById('quote-document');
                    if (quoteElement) quoteElement.scrollIntoView({ behavior: 'smooth' });
                  }}
                    className="flex-1 md:flex-none px-4 py-2.5 bg-indigo-50 border border-indigo-100 text-indigo-600 rounded-xl font-bold text-xs hover:bg-indigo-100 transition-all flex items-center justify-center gap-2">
                    <i className="fas fa-file-invoice"></i> Ver Ficha
                  </button>
                </div>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
              {/* SIDEBAR: CLIENTE Y CRM */}
              <div className="lg:col-span-4 space-y-6 no-print">
                {/* CARD DATOS DEL CLIENTE */}
                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 space-y-6">
                  <div className="flex items-center gap-3 border-b border-slate-100 pb-4">
                    <div className="w-8 h-8 bg-slate-100 rounded-lg flex items-center justify-center text-slate-400">
                      <i className="fas fa-users text-sm"></i>
                    </div>
                    <h3 className="text-sm font-black text-slate-800 tracking-tight">Datos del Cliente</h3>
                  </div>

                  <div className="space-y-4">
                    <div>
                      <h4 className="text-lg font-black text-slate-800">{g.Com_Nombre_Contacto}</h4>
                      <p className="text-[10px] font-bold text-slate-400 uppercase truncate italic mt-1">{g["Empresa/Agencia"] || "Particular"}</p>
                    </div>

                    <div className="space-y-3">
                      <div className="flex items-center gap-3 text-slate-500 text-sm">
                        <i className="fas fa-phone w-4 text-slate-300"></i>
                        <span className="font-medium">{g.Com_Telefono_Contacto || "-"}</span>
                      </div>
                      <div className="flex items-center gap-3 text-slate-500 text-sm">
                        <i className="fas fa-envelope w-4 text-slate-300"></i>
                        <span className="font-medium">{g.Com_Email_Contacto || "-"}</span>
                      </div>
                    </div>

                    {g.Com_Notas && (
                      <div className="pt-4 border-t border-slate-50 space-y-3">
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Notas Internas:</p>
                        <div className="bg-amber-50 border border-amber-100 p-4 rounded-xl text-amber-800 text-xs font-medium leading-relaxed italic">
                          {g.Com_Notas}
                        </div>
                      </div>
                    )}
                  </div>
                </div>

                {/* CARD HISTORIAL / CRM */}
                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 space-y-6">
                  <div className="flex items-center gap-3 border-b border-slate-100 pb-4">
                    <div className="w-8 h-8 bg-indigo-50 rounded-lg flex items-center justify-center text-indigo-500">
                      <i className="fas fa-chart-line text-sm"></i>
                    </div>
                    <h3 className="text-sm font-black text-slate-800 tracking-tight">Historial / CRM</h3>
                  </div>

                  <form onSubmit={addTrackingNote} className="flex gap-2">
                    <textarea
                      value={newNote}
                      onChange={e => setNewNote(e.target.value)}
                      placeholder="Añadir seguimiento..."
                      className="flex-1 bg-slate-50 border border-slate-200 rounded-xl p-3 text-xs outline-none focus:ring-2 focus:ring-indigo-500/10 min-h-[60px] resize-none"
                    ></textarea>
                    <button type="submit" className="w-10 h-10 bg-indigo-500 text-white rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20 hover:scale-105 active:scale-95 transition-all">
                      <i className="fas fa-comment-dots"></i>
                    </button>
                  </form>

                  <div className="space-y-6 relative before:absolute before:left-[17px] before:top-2 before:bottom-0 before:w-0.5 before:bg-slate-50">
                    {(g.tracking || []).map(t => (
                      <div key={t.id} className="relative pl-10">
                        <div className="absolute left-[13px] top-1.5 w-2.5 h-2.5 bg-white border-2 border-indigo-400 rounded-full z-10"></div>
                        <p className="text-[10px] text-slate-300 font-bold mb-1">{t.date}</p>
                        <p className="text-xs text-slate-600 leading-relaxed">{t.text}</p>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* DOCUMENTO DE PROPUESTA */}
              <div className="lg:col-span-8">
                <div className="bg-white rounded-3xl shadow-xl border border-slate-200 print-shadow-none overflow-hidden">
                  <div className="p-12 md:p-16" id="quote-document">
                    <div className={`border-b-4 pb-10 mb-12 text-center ${isCumbria ? 'border-blue-900 text-blue-900' : 'border-orange-600 text-orange-900'}`}>
                      <p className="text-sm font-black tracking-[0.3em] uppercase mb-4 text-slate-400">Oferta Comercial Personalizada</p>
                      <img
                        src={isCumbria ? "Logos/Cumbria Spa&Hotel.jpg" : "Logos/Sercotel Guadiana.jpg"}
                        alt={hotelName}
                        className="h-16 object-contain mx-auto mb-4"
                      />
                      <p className="text-lg font-medium opacity-60 italic">Propuesta de alojamiento y servicios para grupos</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-y-6 gap-x-12 mb-12 text-sm border-b border-slate-100 pb-10">
                      <div className="space-y-1">
                        <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">A la atención de</span>
                        <p className="text-lg font-black text-slate-800">{g.Com_Nombre_Contacto}</p>
                        {g.Com_Email_Contacto && <p className="text-slate-500">{g.Com_Email_Contacto}</p>}
                      </div>
                      <div className="space-y-1">
                        <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Referencia del Evento</span>
                        <p className="text-lg font-black text-slate-800">{g["Nombre del Grupo"]}</p>
                        <p className="text-slate-500">{g.Reserva}</p>
                      </div>
                      <div className="space-y-1">
                        <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Período de Estancia</span>
                        <p className="text-base font-bold text-slate-800">{formatDate(g.Entrada)} al {formatDate(g.Salida)}</p>
                        <p className="text-slate-500 italic">{dates.length} noches estimadas</p>
                      </div>
                      <div className="space-y-1">
                        <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Pax Estimados</span>
                        <p className="text-base font-bold text-slate-800">{totalPax} personas</p>
                      </div>
                    </div>

                    <div className="space-y-8">
                      <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest border-l-4 border-indigo-500 pl-3">Itinerario y Condiciones Económicas</h3>
                      {dates.length > 0 ? (
                        <div className="overflow-hidden rounded-2xl border border-slate-100 text-xs">
                          <table className="w-full text-left border-collapse">
                            <thead>
                              <tr className="bg-slate-50 text-slate-500 font-black text-[10px] uppercase tracking-widest border-b border-slate-100">
                                <th className="p-4">Fecha (Servicio)</th>
                                <th className="p-4">Régimen</th>
                                <th className="p-4">Tipología Alojamiento</th>
                                <th className="p-4 text-right">Subtotal</th>
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                              {dates.map((date, idx) => {
                                const config = g.dailyConfig?.[date] || {};
                                // Normalizamos las activeRooms para imprimir (sumando las que tengan distinta capitalización)
                                const normalizedRooms = {};
                                Object.entries(g.roomCounts || {}).forEach(([t, c]) => {
                                  if (c > 0) {
                                    const lower = t.toLowerCase();
                                    if (normalizedRooms[lower]) {
                                      normalizedRooms[lower].count += Number(c);
                                    } else {
                                      normalizedRooms[lower] = { type: t, count: Number(c) };
                                    }
                                  }
                                });
                                const activeRooms = Object.values(normalizedRooms).map(v => [v.type, v.count]);

                                let boardTitle = config.board || g["Régimen"] || "-";
                                const firstRoomWithConfig = activeRooms.find(([t]) => config[t]);
                                if (firstRoomWithConfig && config[firstRoomWithConfig[0]].board) {
                                  boardTitle = config[firstRoomWithConfig[0]].board;
                                }
                                let subtotalDate = 0;
                                return (
                                  <tr key={date} className="bg-white">
                                    <td className="p-4 align-top font-bold text-slate-800">
                                      {formatDate(date)}
                                      <span className="block text-[10px] text-slate-400 font-black uppercase">Noche {idx + 1}</span>
                                    </td>
                                    <td className="p-4 align-top font-medium text-slate-600">{boardTitle}</td>
                                    <td className="p-4 align-top">
                                      <ul className="space-y-1">
                                        {activeRooms.map(([type, globalCount]) => {
                                          let count = globalCount;
                                          if (config.counts) {
                                            const countKey = Object.keys(config.counts).find(k => k.toLowerCase() === type.toLowerCase());
                                            if (countKey && config.counts[countKey] !== '' && config.counts[countKey] !== undefined) {
                                              count = Number(config.counts[countKey]);
                                            }
                                          }
                                          if (count <= 0) return null;

                                          let price = 0;
                                          let roomBoard = '';
                                          let lineSubtotal = 0;
                                          if (config.prices) {
                                            const priceKey = Object.keys(config.prices).find(k => k.toLowerCase() === type.toLowerCase());
                                            price = priceKey ? parseFloat(config.prices[priceKey] || 0) : 0;
                                            lineSubtotal = price * count;
                                          } else {
                                            const typeKey = Object.keys(config).find(k => k.toLowerCase() === type.toLowerCase());
                                            if (typeKey && config[typeKey]) {
                                              price = parseFloat(config[typeKey].price || 0);
                                              roomBoard = config[typeKey].board || '';
                                              const discount = parseFloat(config[typeKey].discount || 0);
                                              const gratuities = parseInt(config[typeKey].gratuities || 0);
                                              lineSubtotal = Math.max(0, count - gratuities) * price * (1 - discount / 100);
                                            }
                                          }

                                          // Si no tiene precio configurado y no aporta al subtotal, y no estamos en un caso obvio, podemos no mostrar el precio, pero si tiene subtotal > 0 o un precio fijado mostramos "(X,XX €)" en lugar de "(@X,XX €)".

                                          if (price === 0 && lineSubtotal === 0) return null; // No mostrar las bloqueadas a coste cero si es lo que desea, aunque si es gratuidad sí. Si "solo las presupuestadas" significa > 0 dinero

                                          subtotalDate += lineSubtotal;
                                          return (
                                            <li key={type} className="text-slate-500 flex justify-between">
                                              <span>{count}x {type} {roomBoard && roomBoard !== boardTitle ? `(${roomBoard})` : ''} ({formatNum(price)}€)</span>
                                            </li>
                                          );
                                        })}
                                      </ul>
                                    </td>
                                    <td className="p-4 align-bottom text-right font-black text-slate-800 tabular-nums">
                                      {formatNum(subtotalDate)} €
                                    </td>
                                  </tr>
                                );
                              })}
                            </tbody>
                            <tfoot className="bg-slate-900 text-white font-black">
                              {parseFloat(g.Suplementos || 0) > 0 || parseFloat(g.Descuentos || 0) > 0 ? (
                                <>
                                  <tr className="border-b border-slate-700/50 text-slate-300">
                                    <td colSpan="3" className="px-6 py-4 text-right uppercase tracking-widest text-[10px]">Subtotal Estancia:</td>
                                    <td className="px-6 py-4 text-right tabular-nums whitespace-nowrap">{formatNum((calculatedTotal > 0 ? calculatedTotal : 0) - (parseFloat(g.Suplementos || 0)) + (parseFloat(g.Descuentos || 0)))} €</td>
                                  </tr>
                                  {parseFloat(g.Suplementos || 0) > 0 && (
                                    <tr className="border-b border-slate-700/50 text-indigo-300">
                                      <td colSpan="3" className="px-6 py-3 text-right uppercase tracking-widest text-[10px]">+ Suplementos:</td>
                                      <td className="px-6 py-3 text-right tabular-nums whitespace-nowrap">{formatNum(parseFloat(g.Suplementos))} €</td>
                                    </tr>
                                  )}
                                  {parseFloat(g.Descuentos || 0) > 0 && (
                                    <tr className="border-b border-slate-700/50 text-rose-300">
                                      <td colSpan="3" className="px-6 py-3 text-right uppercase tracking-widest text-[10px]">- Descuentos aplicados:</td>
                                      <td className="px-6 py-3 text-right tabular-nums whitespace-nowrap">-{formatNum(parseFloat(g.Descuentos))} €</td>
                                    </tr>
                                  )}
                                  <tr>
                                    <td colSpan="3" className="p-6 text-right uppercase tracking-widest text-xs text-white">Total General Propuesta (Neto):</td>
                                    <td className="p-6 text-right text-xl tabular-nums text-white whitespace-nowrap">{formatNum(calculatedTotal)} €</td>
                                  </tr>
                                </>
                              ) : (
                                <tr>
                                  <td colSpan="3" className="p-6 text-right uppercase tracking-widest text-xs">Total General Propuesta (Neto):</td>
                                  <td className="p-6 text-right text-xl tabular-nums whitespace-nowrap">{formatNum(calculatedTotal)} €</td>
                                </tr>
                              )}
                            </tfoot>
                          </table>
                        </div>
                      ) : (
                        <div className="bg-slate-50 p-8 rounded-2xl text-center border border-slate-200">
                          <p className="text-lg font-black text-indigo-700">{formatNum(calculatedTotal)} € (Total Estimado)</p>
                          <p className="text-xs text-slate-400 mt-2">Detalle de noches no configurado aún.</p>
                        </div>
                      )}
                    </div>

                    <div className="mt-16 space-y-12">
                      <div className="space-y-4">
                        <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] border-b pb-2">Cláusulas y Condiciones del Grupo</h4>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-[11px] text-slate-500 leading-relaxed list-none">
                          {(() => {
                            const hotelKey = isCumbria ? 'cumbria' : 'guadiana';
                            const clauses = globalConfig?.[hotelKey]?.clauses;

                            if (clauses && clauses.length > 0) {
                              return clauses.map((clause, idx) => {
                                const bodyParsed = clause.body.replace(/{DEP_30}/g, formatNum(calculatedTotal * 0.3) + '€');
                                return (
                                  <div key={idx} className="flex gap-4 text-[10px]">
                                    <span className="w-6 h-6 flex-shrink-0 bg-slate-100 rounded-full flex items-center justify-center font-black text-slate-800">{idx + 1}</span>
                                    <p><strong className="text-slate-800 block mb-1">{clause.title}:</strong> {bodyParsed}</p>
                                  </div>
                                );
                              });
                            } else {
                              return (
                                <>
                                  <div className="flex gap-4 text-[10px]">
                                    <span className="w-6 h-6 flex-shrink-0 bg-slate-100 rounded-full flex items-center justify-center font-black text-slate-800">1</span>
                                    <p><strong className="text-slate-800 block mb-1">Cupo y Disponibilidad:</strong> La presente oferta es válida por 48 horas. Dado que se requiere el bloqueo total de instalaciones, la disponibilidad no se garantiza hasta el primer depósito.</p>
                                  </div>
                                  <div className="flex gap-4 text-[10px]">
                                    <span className="w-6 h-6 flex-shrink-0 bg-slate-100 rounded-full flex items-center justify-center font-black text-slate-800">2</span>
                                    <p><strong className="text-slate-800 block mb-1">Confirmación y Depósito:</strong> Bloqueo confirmado al recibir el 30% del total ({formatNum(calculatedTotal * 0.3)}€). El 70% restante deberá liquidarse 7 días antes de la entrada.</p>
                                  </div>
                                  <div className="flex gap-4 text-[10px]">
                                    <span className="w-6 h-6 flex-shrink-0 bg-slate-100 rounded-full flex items-center justify-center font-black text-slate-800">3</span>
                                    <p><strong className="text-slate-800 block mb-1">Política de Cancelación:</strong> Al ser un evento de carácter exclusivo con bloqueo de inventario, todos los depósitos entregados tienen carácter de NO REEMBOLSABLES.</p>
                                  </div>
                                  <div className="flex gap-4 text-[10px]">
                                    <span className="w-6 h-6 flex-shrink-0 bg-slate-100 rounded-full flex items-center justify-center font-black text-slate-800">4</span>
                                    <p><strong className="text-slate-800 block mb-1">Rooming List:</strong> La relación detallada de ocupantes deberá entregarse 5 días hábiles antes de la llegada del primer pasajero.</p>
                                  </div>
                                </>
                              );
                            }
                          })()}
                        </div>
                      </div>

                      <div className="pt-10 mt-10 border-t border-slate-100 grid grid-cols-1 md:grid-cols-2 gap-10">
                        <div className="space-y-2 opacity-60">
                          <p className="text-[10px] font-black uppercase tracking-widest text-slate-400">Generado por Comercial</p>
                          <p className="text-sm font-bold text-slate-800 italic">{isCumbria ? "Dpto. Eventos Cumbria" : "Dpto. Grupos Sercotel Guadiana"}</p>
                        </div>
                        <div className="text-right space-y-1">
                          <p className="text-[10px] font-black uppercase tracking-widest text-slate-400">Fecha del Documento</p>
                          <p className="text-sm font-black text-slate-800">{new Date().toLocaleDateString('es-ES')}</p>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="mt-6 flex justify-end no-print">
                  <button onClick={() => window.print()} className="bg-slate-900 hover:bg-black text-white px-8 py-3 rounded-2xl font-black transition-all shadow-xl flex items-center gap-3">
                    <i className="fas fa-print"></i> IMPRIMIR PDF
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="flex flex-col min-h-screen">
          {/* NAV BAR */}
          <nav className="bg-white border-b border-slate-200 z-50 no-print">
            <div className="max-w-7xl mx-auto px-6 h-18 flex items-center justify-between">
              <div className="flex items-center gap-4 cursor-pointer py-4" onClick={() => setCurrentView('dashboard')}>
                <div className="w-9 h-9 bg-slate-900 rounded-xl flex items-center justify-center shadow-lg">
                  <i className="fas fa-layer-group text-white text-sm"></i>
                </div>
                <div>
                  <h1 className="text-base font-black tracking-tight leading-none mb-1">Nexus Presupuestos</h1>
                  <p className="text-[9px] text-slate-400 font-bold uppercase tracking-[0.2em]">Sales Hub</p>
                </div>
              </div>
              <div className="flex items-center gap-6">
                <a href="Gestión de Grupos.html" className="text-[10px] font-black text-slate-400 hover:text-slate-900 transition-colors uppercase tracking-widest flex items-center gap-2">
                  <i className="fas fa-arrow-left"></i> Volver a Grupos
                </a>
              </div>
            </div>
          </nav>

          <main className="flex-grow p-4 md:p-8">
            {loading ? (
              <div className="h-64 flex flex-col items-center justify-center space-y-4">
                <div className="w-10 h-10 border-4 border-slate-100 border-t-indigo-500 rounded-full animate-spin"></div>
                <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Conectando...</p>
              </div>
            ) : (
              <>
                {currentView === 'dashboard' && renderDashboard()}
                {currentView === 'create' && renderCreate()}
                {currentView === 'detail' && renderDetail()}
              </>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
