<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Groups - Facturas Proforma</title>
    <link rel="icon" type="image/png" href="Nexus Groups/Nexus_Groups_ICO-removebg-preview.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Inter", "ui-sans-serif", "system-ui"],
                        outfit: ["Outfit", "sans-serif"],
                    },
                },
            },
        };
    </script>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/lucide/dist/umd/lucide.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --nexus-bg: #f8fafc;
            --nexus-card: #ffffff;
            --nexus-accent: #10b981;
            --nexus-accent-light: rgba(16, 185, 129, 0.1);
            --nexus-border: #e2e8f0;
            --nexus-text: #1e293b;
            --nexus-text-dim: #64748b;
        }
        body {
            font-family: "Outfit", sans-serif;
            background-color: var(--nexus-bg);
            color: var(--nexus-text);
            margin: 0;
            overflow-x: hidden;
        }
        .premium-card {
            background: var(--nexus-card);
            border: 1px solid var(--nexus-border);
            border-radius: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .premium-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
        }
        .sidebar-item-active {
            background: var(--nexus-accent-light);
            color: var(--nexus-accent);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="app" class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 h-screen fixed left-0 top-0 bg-white border-r border-slate-200 p-6 flex flex-col z-30 shadow-2xl shadow-slate-200/50">
            <div class="flex flex-col items-center mb-8 px-2 space-y-6">
                <div class="w-full flex justify-center p-4">
                    <img src="Nexus%20Groups/Nexus_Groups-removebg-preview.png" class="h-20 w-auto object-contain" alt="Nexus Groups Logo" />
                </div>
                <div class="h-[1px] w-full bg-slate-100"></div>
            </div>

            <nav class="flex-1 space-y-2">
                <button onclick="window.location.href='Admin.html'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50 hover:translate-x-1 transition-all">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    Panel de Control
                </button>
                <button onclick="window.location.href='Gestión de Grupos.html'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50 hover:translate-x-1 transition-all">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    Directorio Grupos
                </button>
                <button onclick="window.location.href='Presupuestos.html'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50 hover:translate-x-1 transition-all">
                    <i data-lucide="clipboard-list" class="w-5 h-5"></i>
                    Seguimiento Presupuestos
                </button>
                <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold sidebar-item-active transition-all">
                    <i data-lucide="file-text" class="w-5 h-5"></i>
                    Facturas Proforma
                </button>
                <button onclick="window.open('https://nataliogc.github.io/menus-eventos/admin.html', '_blank')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50 hover:translate-x-1 transition-all">
                    <i data-lucide="utensils" class="w-5 h-5"></i>
                    Menús Eventos
                </button>
                <button onclick="window.open('https://nataliogc.github.io/Menus-Turisticos/', '_blank')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50 hover:translate-x-1 transition-all">
                    <i data-lucide="map" class="w-5 h-5"></i>
                    Menús Turísticos
                </button>
                <button onclick="window.open('https://nataliogc.github.io/menus-cocteles/', '_blank')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50 hover:translate-x-1 transition-all">
                    <i data-lucide="martini" class="w-5 h-5"></i>
                    Menús Cócteles
                </button>
                <button onclick="window.location.href='Configuracion.html'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50 hover:translate-x-1 transition-all">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                    Configuración
                </button>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 ml-64 p-8">
            <header class="flex justify-between items-center mb-8 pt-2">
                <div>
                    <h1 class="text-3xl font-black text-slate-800 tracking-tight">Registro de Proformas Independientes</h1>
                    <p class="text-slate-500 font-medium">Gestión de facturas no asociadas a grupos existentes</p>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="newProforma()" class="flex items-center gap-2 px-6 py-3 bg-slate-900 hover:bg-slate-800 text-white rounded-2xl font-black text-sm transition-all shadow-xl shadow-slate-900/20 active:scale-95">
                        <i data-lucide="plus" class="w-5 h-5"></i>
                        Nueva Proforma
                    </button>
                </div>
            </header>

            <!-- Status Tabs -->
            <div class="flex gap-2 mb-6">
                <button onclick="setStatusFilter('pendiente')" id="tab-pendiente" class="px-6 py-2 rounded-xl text-sm font-bold transition-all sidebar-item-active">
                    Pendientes
                </button>
                <button onclick="setStatusFilter('facturado')" id="tab-facturado" class="px-6 py-2 rounded-xl text-sm font-bold transition-all text-slate-500 hover:bg-slate-100">
                    Facturadas
                </button>
            </div>

            <!-- Search and Filters -->
            <div class="premium-card p-4 mb-8 flex gap-4 items-center">
                <div class="relative flex-1">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                    <input type="text" id="search-input" placeholder="Buscar por cliente, ID o referencia..." class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all text-sm font-medium" />
                </div>
                <select id="hotel-filter" class="px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl focus:outline-none text-sm font-bold text-slate-700">
                    <option value="all">Todos los Hoteles</option>
                    <option value="guadiana">Sercotel Guadiana</option>
                    <option value="cumbria">Sercotel Cumbria</option>
                </select>
            </div>

            <!-- List of Proformas -->
            <div class="premium-card overflow-hidden">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50/50 border-b border-slate-100">
                            <th class="px-6 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400">ID / Fecha</th>
                            <th class="px-6 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400 min-w-[250px]">Cliente / Organismo</th>
                            <th class="px-6 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400">Referencia</th>
                            <th class="px-6 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400 text-center">Hotel</th>
                            <th class="px-6 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400 text-right">Total</th>
                            <th class="px-6 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="proforma-list" class="divide-y divide-slate-50">
                        <!-- Items will be loaded here -->
                        <tr>
                            <td colspan="6" class="px-6 py-12 text-center text-slate-400 font-medium">
                                <div class="flex flex-col items-center gap-2">
                                    <div class="w-8 h-8 border-4 border-slate-200 border-t-emerald-500 rounded-full animate-spin"></div>
                                    Cargando registro de proformas...
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/firebase-init.js"></script>
    <script>
        const db = window.db;
        let allProformas = [];
        let currentStatusFilter = 'pendiente';

        function setStatusFilter(status) {
            currentStatusFilter = status;
            document.getElementById('tab-pendiente').className = status === 'pendiente' 
                ? 'px-6 py-2 rounded-xl text-sm font-bold transition-all sidebar-item-active'
                : 'px-6 py-2 rounded-xl text-sm font-bold transition-all text-slate-500 hover:bg-slate-100';
            document.getElementById('tab-facturado').className = status === 'facturado' 
                ? 'px-6 py-2 rounded-xl text-sm font-bold transition-all sidebar-item-active'
                : 'px-6 py-2 rounded-xl text-sm font-bold transition-all text-slate-500 hover:bg-slate-100';
            renderProformas();
        }

        async function loadProformas() {
            try {
                // Buscamos en la colección groups pero filtrando por el prefijo prof- o un flag
                // Para ser más eficientes, buscaremos IDs que empiecen por "prof-"
                // Firestore no tiene un startWith directo en IDs de documentos de forma nativa sin rangos
                // así que traeremos los que tengan un flag 'isIndependentProforma' true
                // Quitamos el orderBy de la consulta para evitar requerir un índice compuesto, 
                // ya que Firestore exige un índice para filtrar por un campo (isIndependentProforma) y ordenar por otro (updatedAt).
                // Ordenaremos los resultados en memoria.
                const snapshot = await db.collection("groups")
                    .where("isIndependentProforma", "==", true)
                    .get();

                allProformas = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                })).sort((a, b) => {
                    const timeA = a.updatedAt?.seconds || 0;
                    const timeB = b.updatedAt?.seconds || 0;
                    return timeB - timeA;
                });

                renderProformas();
            } catch (error) {
                console.error("Error cargando proformas:", error);
                document.getElementById('proforma-list').innerHTML = `
                    <tr>
                        <td colspan="6" class="px-6 py-12 text-center text-red-400 font-medium">
                            Error al cargar los datos. Por favor, reintente.
                        </td>
                    </tr>
                `;
            }
        }

        function renderProformas() {
            const list = document.getElementById('proforma-list');
            const search = document.getElementById('search-input').value.toLowerCase();
            const hotelFilter = document.getElementById('hotel-filter').value;

            const filtered = allProformas.filter(p => {
                const searchRef = (p.Reserva || p.id).toLowerCase();
                const matchesSearch = 
                    searchRef.includes(search) || 
                    (p.solicitante_org || "").toLowerCase().includes(search) || 
                    (p.programa || "").toLowerCase().includes(search);
                
                const matchesHotel = hotelFilter === 'all' || (p.hotel || "guadiana") === hotelFilter;
                const matchesStatus = (p.status || "pendiente") === currentStatusFilter;

                return matchesSearch && matchesHotel && matchesStatus;
            });

            if (filtered.length === 0) {
                list.innerHTML = `
                    <tr>
                        <td colspan="6" class="px-6 py-12 text-center text-slate-400 font-medium">
                            No se encontraron proformas que coincidan con los criterios.
                        </td>
                    </tr>
                `;
                return;
            }

            list.innerHTML = filtered.map(p => {
                const date = p.updatedAt ? new Date(p.updatedAt.seconds * 1000).toLocaleDateString('es-ES') : '---';
                const hotelName = p.hotel === 'cumbria' ? 'Cumbria' : 'Guadiana';
                const hotelColor = p.hotel === 'cumbria' ? 'bg-slate-100 text-slate-700' : 'bg-emerald-50 text-emerald-700';
                const displayId = p.Reserva || p.id;
                const total = p.total || 0;

                return `
                    <tr class="hover:bg-slate-50 transition-colors group">
                        <td class="px-6 py-4">
                            <div class="flex flex-col">
                                <span class="text-sm font-black text-slate-800">${displayId}</span>
                                <span class="text-[10px] font-bold text-slate-400 uppercase tabular-nums">${date}</span>
                            </div>
                        </td>
                        <td class="px-6 py-4">
                            <span class="text-sm font-bold text-slate-700">${p.solicitante_org || 'S/D'}</span>
                        </td>
                        <td class="px-6 py-4">
                            <span class="text-sm font-medium text-slate-600">${p.programa || '---'}</span>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider ${hotelColor}">
                                ${hotelName}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <span class="text-sm font-black text-slate-800 tabular-nums">${NexusUtils.formatCurrency(total)}</span>
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex items-center justify-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button onclick="markAsInvoiced('${p.id}', '${p.status || 'pendiente'}')" 
                                    class="p-2 ${p.status === 'facturado' ? 'bg-amber-50 text-amber-600' : 'bg-emerald-50 text-emerald-600'} rounded-lg hover:scale-110 transition-all" 
                                    title="${p.status === 'facturado' ? 'Devolver a Pendiente' : 'Marcar como Facturado'}">
                                    <i data-lucide="${p.status === 'facturado' ? 'rotate-ccw' : 'check-circle'}" class="w-4 h-4"></i>
                                </button>
                                <button onclick="editProforma('${p.id}')" class="p-2 bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-100 transition-all" title="Editar">
                                    <i data-lucide="edit-3" class="w-4 h-4"></i>
                                </button>
                                <button onclick="deleteProforma('${p.id}')" class="p-2 bg-rose-50 text-rose-600 rounded-lg hover:bg-rose-100 transition-all" title="Eliminar">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
            
            lucide.createIcons();
        }

        function newProforma() {
            localStorage.removeItem('selectedGroup');
            // Creamos un objeto "mock" para que Fac Prof sepa que es una nueva proforma independiente
            const newId = 'prof-' + Date.now();
            const mockGroup = {
                id: newId,
                Reserva: newId,
                isIndependentProforma: true,
                "Nombre del Grupo": "Nueva Proforma"
            };
            localStorage.setItem('selectedGroup', JSON.stringify(mockGroup));
            window.location.href = 'Fac Prof.html';
        }

        function editProforma(id) {
            const p = allProformas.find(x => x.id === id);
            localStorage.setItem('selectedGroup', JSON.stringify({
                ...p,
                Reserva: p.Reserva || p.id 
            }));
            window.location.href = 'Fac Prof.html';
        }

        async function deleteProforma(id) {
            if (confirm(`¿Estás seguro de que deseas eliminar la proforma ${id}? Esta acción no se puede deshacer.`)) {
                try {
                    await db.collection("groups").doc(id).delete();
                    allProformas = allProformas.filter(p => p.id !== id);
                    renderProformas();
                } catch (e) {
                    alert("Error eliminando proforma: " + e.message);
                }
            }
        }

        async function markAsInvoiced(id, currentStatus) {
            const newStatus = currentStatus === 'facturado' ? 'pendiente' : 'facturado';
            const msg = newStatus === 'facturado' 
                ? '¿Marcar esta proforma como FACTURADA? Se moverá al registro de facturadas.'
                : '¿Devolver esta proforma a PENDIENTES?';
                
            if (confirm(msg)) {
                try {
                    await db.collection("groups").doc(id).update({
                        status: newStatus,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    // Actualizar local
                    const index = allProformas.findIndex(p => p.id === id);
                    if (index !== -1) {
                        allProformas[index].status = newStatus;
                    }
                    renderProformas();
                } catch (e) {
                    alert("Error al actualizar estado: " + e.message);
                }
            }
        }

        document.getElementById('search-input').addEventListener('input', renderProformas);
        document.getElementById('hotel-filter').addEventListener('change', renderProformas);

        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            loadProformas();
        });
    </script>
</body>
</html>
